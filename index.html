<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #F2F4EA; }
  body { font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
  ::-webkit-scrollbar { width: 0; }
  .app { width: 100%; max-width: 480px; min-height: 100vh; background: #FCFDF7; box-shadow: 0 0 50px rgba(40,60,30,0.06); display: flex; flex-direction: column; }

  header { padding: 30px 24px 18px; }
  .brand { display: flex; align-items: center; gap: 13px; }
  .badge { width: 46px; height: 46px; border-radius: 13px; overflow: hidden; flex: none; box-shadow: 0 2px 8px rgba(40,60,30,0.18); }
  .badge img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .eyebrow { font-size: 12px; letter-spacing: 0.04em; font-weight: 700; color: #3FA635; margin-bottom: 4px; white-space: nowrap; }
  .title { font-family: 'Gowun Batang', serif; font-size: 27px; font-weight: 700; color: #2B3326; line-height: 1; white-space: nowrap; }
  .sub { font-size: 14px; color: #8B9682; margin-top: 16px; line-height: 1.65; }

  .tabs { display: flex; gap: 8px; padding: 4px 24px 18px; }
  .tab { flex: 1; padding: 13px 6px; border: 1.5px solid #DCE6D0; background: transparent; color: #8B9682; border-radius: 13px; font-size: 14.5px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .tab.active { background: #3FA635; color: #fff; border-color: #3FA635; }

  main { flex: 1; }
  label { display: block; font-size: 13px; font-weight: 700; color: #3FA635; margin-bottom: 8px; }
  #form-area { padding: 2px 24px 32px; }
  input, textarea { width: 100%; border: 1.5px solid #DCE6D0; background: #fff; border-radius: 13px; padding: 15px; font-size: 15.5px; font-family: inherit; color: #2B3326; outline: none; transition: border-color .15s; }
  input:focus, textarea:focus { border-color: #3FA635; }
  textarea { height: 168px; resize: none; line-height: 1.65; margin-bottom: 0; }
  label.mt { margin-top: 22px; }
  .cc { text-align: right; font-size: 12.5px; color: #8B9682; margin-top: 7px; }
  .btn { width: 100%; padding: 16px; background: #3FA635; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity .2s; }
  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  #submit { margin-top: 26px; }
  .btn.ghost { background: transparent; border: 1.5px solid #DCE6D0; color: #8B9682; margin-top: 11px; font-size: 14.5px; padding: 14px; }

  .success { text-align: center; padding: 48px 30px 56px; }
  .success .badge { width: 66px; height: 66px; border-radius: 18px; margin: 0 auto 24px; }
  .success h2 { font-family: 'Gowun Batang', serif; font-size: 22px; color: #2B3326; margin-bottom: 12px; }
  .success p { font-size: 14.5px; color: #8B9682; line-height: 1.75; margin-bottom: 30px; }

  #view-list { padding: 2px 24px 40px; }
  .list-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .list-count { font-size: 13.5px; color: #8B9682; white-space: nowrap; }
  .list-count b { color: #3FA635; }
  .refresh { padding: 8px 13px; background: #E6F2DE; border: none; border-radius: 20px; font-size: 12.5px; font-weight: 700; color: #3FA635; cursor: pointer; font-family: inherit; flex: none; white-space: nowrap; }
  .month-tabs { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 14px; }
  .month-tabs::-webkit-scrollbar { height: 0; }
  .month-tab { flex: none; padding: 7px 15px; border-radius: 20px; border: 1.5px solid #DCE6D0; background: #fff; color: #8B9682; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all .15s; }
  .month-tab.active { background: #3FA635; color: #fff; border-color: #3FA635; }
  .sort-row { display: flex; gap: 7px; margin-bottom: 14px; }
  .sort-pill { padding: 6px 14px; border-radius: 18px; border: 1.5px solid #DCE6D0; background: #fff; color: #8B9682; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .sort-pill.active { background: #2B3326; color: #fff; border-color: #2B3326; }
  .group { background: #fff; border: 1px solid #DCE6D0; border-left: 3px solid #3FA635; border-radius: 14px; padding: 14px 16px; }
  .group-h { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .group-name { font-size: 15px; font-weight: 700; color: #2B3326; white-space: nowrap; }
  .group-count { font-size: 11px; font-weight: 700; color: #3FA635; background: #E6F2DE; padding: 2px 8px; border-radius: 20px; }
  .group-items { display: flex; flex-direction: column; }
  .g-item { padding: 11px 0; border-top: 1px solid #EEF1E7; }
  .g-item:first-child { border-top: none; padding-top: 0; }
  .g-time { font-size: 11px; color: #A7B19C; margin-bottom: 4px; }
  .g-body { font-size: 14px; color: #47503E; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card { background: #fff; border: 1px solid #DCE6D0; border-left: 3px solid #3FA635; border-radius: 14px; padding: 16px 17px; }
  .card-h { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card-name { font-size: 15px; font-weight: 700; color: #2B3326; white-space: nowrap; }
  .card-time { font-size: 11.5px; color: #A7B19C; flex: none; white-space: nowrap; }
  .card-body { font-size: 14px; color: #47503E; line-height: 1.78; white-space: pre-wrap; word-break: break-word; }
  .state { text-align: center; padding: 50px 20px; color: #8B9682; font-size: 14px; line-height: 1.7; }
  .spinner { width: 30px; height: 30px; border: 3px solid #E6F2DE; border-top-color: #3FA635; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { text-align: center; padding: 18px 24px 26px; font-size: 11.5px; color: #B7C0AC; border-top: 1px solid #EEF1E7; }
</style>

        <h2>기도제목이 전달되었어요</h2>
        <p>소중한 기도제목 나눠주셔서 감사해요.<br>아둘람 청년부가 함께 마음 모아 기도하겠습니다.</p>
        <button class="btn" onclick="goList()">기도 나눔에서 보기</button>
        <button class="btn ghost" onclick="resetForm()">기도제목 추가로 남기기</button>
      </div>
    </section>

    <section id="view-list" style="display:none">
      <div id="month-tabs" class="month-tabs"></div>
      <div class="sort-row">
        <button id="sort-latest" class="sort-pill active" onclick="setSort('latest')">최신순</button>
        <button id="sort-name" class="sort-pill" onclick="setSort('name')">이름별</button>
      </div>
      <div class="list-head">
        <div class="list-count" id="list-count">기도제목</div>
        <button class="refresh" onclick="loadList()">새로고침</button>
      </div>
      <div id="list-area"></div>
    </section>
  </main>

  <footer>순복음안디옥교회 · 아둘람 청년부</footer>
</div>

<script>
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHVVRaPMsUaebMlzWlkTOohxdtyBqYvwmDjrXIKd9IQ-5A4je7jahEVtICwxNRibXe/exec';
  var listLoaded = false;
  var allData = [];
  var curMonth = null;
  var multiYear = false;
  var sortMode = 'latest';

  var prayerEl = document.getElementById('prayer');
  var nameEl = document.getElementById('name');
  var submitBtn = document.getElementById('submit');

  prayerEl.addEventListener('input', function () {
    document.getElementById('cc').textContent = this.value.length;
    submitBtn.disabled = this.value.trim().length === 0;
  });

  function setTab(tab) {
    var write = tab === 'write';
    document.getElementById('tab-write').classList.toggle('active', write);
    document.getElementById('tab-list').classList.toggle('active', !write);
    document.getElementById('view-write').style.display = write ? '' : 'none';
    document.getElementById('view-list').style.display = write ? 'none' : '';
    if (!write && !listLoaded) loadList();
  }

  function submitPrayer() {
    var prayer = prayerEl.value.trim();
    if (!prayer) return;
    var name = nameEl.value.trim() || '익명';
    submitBtn.disabled = true;
    submitBtn.textContent = '제출 중...';
    var url = APPS_SCRIPT_URL + '?action=submit&name=' + encodeURIComponent(name) + '&prayer=' + encodeURIComponent(prayer);
    fetch(url, { method: 'GET', mode: 'no-cors' })
      .then(function () {
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-area').style.display = 'block';
        submitBtn.textContent = '기도제목 제출하기';
        listLoaded = false;
      })
      .catch(function () {
        alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        submitBtn.disabled = false;
        submitBtn.textContent = '기도제목 제출하기';
      });
  }

  function resetForm() {
    nameEl.value = '';
    prayerEl.value = '';
    document.getElementById('cc').textContent = '0';
    submitBtn.disabled = true;
    document.getElementById('form-area').style.display = 'block';
    document.getElementById('success-area').style.display = 'none';
  }

  function goList() {
    resetForm();
    setTab('list');
    document.getElementById('tab-write').classList.remove('active');
    document.getElementById('tab-list').classList.add('active');
    document.getElementById('view-write').style.display = 'none';
    document.getElementById('view-list').style.display = '';
    loadList();
  }

  function loadList() {
    var area = document.getElementById('list-area');
    area.innerHTML = '<div class="state"><div class="spinner"></div>기도제목을 불러오는 중...</div>';
    fetch(APPS_SCRIPT_URL + '?action=list')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        listLoaded = true;
        allData = Array.isArray(data) ? data : [];
        document.getElementById('count').textContent = allData.length;
        if (allData.length === 0) {
          document.getElementById('month-tabs').innerHTML = '';
          document.getElementById('list-count').innerHTML = '기도제목 0개';
          area.innerHTML = '<div class="state">아직 나눠진 기도제목이 없어요.<br>첫 기도제목을 남겨주세요.</div>';
          return;
        }
        var months = getMonths();
        if (months.indexOf(curMonth) === -1) curMonth = months[0];
        renderMonths(months);
        renderCards();
      })
      .catch(function () {
        document.getElementById('month-tabs').innerHTML = '';
        area.innerHTML = '<div class="state">불러오는 데 실패했어요.<br><button class="btn" style="max-width:160px;margin:14px auto 0" onclick="loadList()">다시 시도</button></div>';
      });
  }

  function monthKey(ts) {
    var d = new Date(ts);
    if (isNaN(d.getTime())) return 'unknown';
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
  }
  function monthLabel(key) {
    if (key === 'all') return '전체';
    if (key === 'unknown') return '기타';
    var p = key.split('-');
    return multiYear ? (p[0].slice(2) + '년 ' + Number(p[1]) + '월') : (Number(p[1]) + '월');
  }
  function getMonths() {
    var seen = {}, years = {};
    allData.forEach(function (it) {
      var k = monthKey(it && it.timestamp);
      seen[k] = true;
      if (k !== 'unknown') years[k.split('-')[0]] = true;
    });
    multiYear = Object.keys(years).length > 1;
    return Object.keys(seen).sort(function (a, b) {
      if (a === 'unknown') return 1;
      if (b === 'unknown') return -1;
      return a < b ? 1 : -1;
    });
  }
  function renderMonths(months) {
    var html = '<button class="month-tab' + (curMonth === 'all' ? ' active' : '') + '" onclick="selectMonth(\'all\')">전체</button>';
    for (var i = 0; i < months.length; i++) {
      html += '<button class="month-tab' + (curMonth === months[i] ? ' active' : '') +
        '" onclick="selectMonth(\'' + months[i] + '\')">' + esc(monthLabel(months[i])) + '</button>';
    }
    document.getElementById('month-tabs').innerHTML = html;
  }
  function selectMonth(key) {
    curMonth = key;
    renderMonths(getMonths());
    renderCards();
  }
  function setSort(mode) {
    sortMode = mode;
    document.getElementById('sort-latest').classList.toggle('active', mode === 'latest');
    document.getElementById('sort-name').classList.toggle('active', mode === 'name');
    renderCards();
  }
  function tsVal(it) {
    var d = new Date(it && it.timestamp);
    return isNaN(d.getTime()) ? 0 : d.getTime();
  }
  function renderCards() {
    var area = document.getElementById('list-area');
    var items = [];
    for (var i = 0; i < allData.length; i++) {
      var it = allData[i] || {};
      if (curMonth === 'all' || monthKey(it.timestamp) === curMonth) items.push(it);
    }
    document.getElementById('list-count').innerHTML =
      (curMonth === 'all' ? '전체' : esc(monthLabel(curMonth))) + ' 기도제목 <b>' + items.length + '</b>개';
    if (items.length === 0) {
      area.innerHTML = '<div class="state">이 기간에 나눠진 기도제목이 없어요.</div>';
      return;
    }
    if (sortMode === 'name') { area.innerHTML = renderGrouped(items); return; }
    var sorted = items.slice().sort(function (a, b) { return tsVal(b) - tsVal(a); });
    var html = '<div class="cards">';
    for (var j = 0; j < sorted.length; j++) {
      var p = sorted[j];
      html += '<div class="card"><div class="card-h"><span class="card-name">' +
        esc(p.name || '익명') + '</span><span class="card-time">' +
        esc(fmtTime(p.timestamp)) + '</span></div><div class="card-body">' +
        esc(p.prayer || '') + '</div></div>';
    }
    html += '</div>';
    area.innerHTML = html;
  }
  function renderGrouped(items) {
    var groups = {};
    items.forEach(function (it) {
      var n = it.name || '익명';
      (groups[n] = groups[n] || []).push(it);
    });
    var names = Object.keys(groups).sort(function (a, b) { return a.localeCompare(b, 'ko'); });
    var html = '<div class="cards">';
    names.forEach(function (n) {
      var arr = groups[n].slice().sort(function (a, b) { return tsVal(b) - tsVal(a); });
      html += '<div class="group"><div class="group-h"><span class="group-name">' + esc(n) +
        '</span><span class="group-count">' + arr.length + '</span></div><div class="group-items">';
      arr.forEach(function (it) {
        html += '<div class="g-item"><div class="g-time">' + esc(fmtTime(it.timestamp)) +
          '</div><div class="g-body">' + esc(it.prayer || '') + '</div></div>';
      });
      html += '</div></div>';
    });
    html += '</div>';
    return html;
  }

  function fmtTime(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff / 60) + '분 전';
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
    if (diff < 604800) return Math.floor(diff / 86400) + '일 전';
    return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
